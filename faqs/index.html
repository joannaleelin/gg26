<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#050505">
<title>FAQs · GG26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
<script src="/assets/faqs.js"></script>
</head>
<body>
<div class="app">
  <header class="topbar">
    <a class="back" href="/" aria-label="Back to home">←</a>
    <span class="title">FAQs</span>
  </header>

  <div class="page-content">
    <h2 class="section-h">FAQs</h2>
    <p class="section-sub">Tap any question to expand</p>
    <div id="faqContent"></div>
  </div>
</div>

<script>
const FAQS = window.GG_FAQS;

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function linkify(s) {
  return s
    .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>')
    .replace(/(\b\d{3}-\d{3}-\d{4}\b)/g, '<a href="tel:+1$1">$1</a>')
    .replace(/([a-z0-9._-]+@[a-z0-9.-]+\.[a-z]{2,})/gi, '<a href="mailto:$1">$1</a>');
}

document.getElementById('faqContent').innerHTML = FAQS.map(section => `
  <div class="faq-section">
    <div class="faq-section-title">${esc(section.title)}</div>
    ${section.qa.map(item => `
      <details class="faq">
        <summary>${esc(item.q)}</summary>
        <div class="answer">${linkify(esc(item.a))}</div>
      </details>
    `).join('')}
  </div>
`).join('');
</script>
</body>
</html>
