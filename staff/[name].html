<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#050505">
<title>Staff Member · GG26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
<script src="/assets/data.js"></script>
<script src="/assets/info-sheets.js"></script>
</head>
<body>
<div class="app">
  <header class="topbar">
    <a class="back" href="/staff" aria-label="Back to directory">←</a>
    <span class="title" id="topTitle">Staff Member</span>
  </header>

  <div id="content"></div>
</div>

<script>
const DATA = window.GG_DATA;
const SHEETS = window.GG_INFO_SHEETS || {};

function slugify(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function getSlug() {
  const path = location.pathname.replace(/\/$/, '');
  const parts = path.split('/').filter(Boolean);
  const i = parts.indexOf('staff');
  if (i >= 0 && parts[i + 1] && !parts[i + 1].endsWith('.html') && parts[i + 1] !== '[name]') {
    return parts[i + 1];
  }
  const params = new URLSearchParams(location.search);
  if (params.get('slug')) return params.get('slug');
  if (params.get('name')) return slugify(params.get('name'));
  return null;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ----- shared phase block (used in both rich and fallback layouts) -----
function phaseRow(s, label, phase) {
  const role = s[phase + '_role'] || 'No assignment';
  const team = s[phase + '_team'];
  const leadName = s[phase + '_lead_name'];
  const leadPhone = s[phase + '_lead_phone'];
  const leadTel = s[phase + '_lead_tel'];
  const isMe = leadName === s.name;
  const isOff = role === 'No assignment';
  return `
    <div class="phase-block">
      <div class="phase-label">${esc(label)}</div>
      <div class="field">
        <div class="field-label">Role</div>
        <div class="field-value ${isOff ? 'dim' : ''}">${esc(role)}</div>
      </div>
      ${team ? `
      <div class="field">
        <div class="field-label">Team</div>
        <div class="field-value">${esc(team)}</div>
      </div>` : ''}
      ${leadName && !isMe ? `
      <div class="field">
        <div class="field-label">Team Lead</div>
        <div class="field-value">
          ${esc(leadName)}${leadTel ? ` &middot; <a class="lead-link" href="tel:${leadTel}">${esc(leadPhone)}</a>` : ''}
        </div>
      </div>` : isMe ? `
      <div class="field">
        <div class="field-label">Team Lead</div>
        <div class="field-value dim">You're the lead</div>
      </div>` : ''}
    </div>
  `;
}

// ----- rich layout pieces (only when info-sheet exists) -----
function topNavHTML() {
  return `
    <div class="info-nav">
      <a href="/before-you-arrive" class="info-nav-btn">
        <span class="info-nav-label">Before You Arrive</span>
        <span class="info-nav-sub">Saturday, May 9</span>
      </a>
      <a href="/day-of-professionalism" class="info-nav-btn">
        <span class="info-nav-label">Day-of Professionalism</span>
        <span class="info-nav-sub">How we show up</span>
      </a>
    </div>
  `;
}

function timelineHTML(callTime) {
  const rows = [
    [`Saturday, May 9 — ${esc(callTime || 'TBD')}`, 'Your staff call time — check-in with Joanna at the Gold House Production Office'],
    ['2:30–4:30 PM',     'Pre-event setup (seating, check-in stations, talent tech check)'],
    ['4:30–6:30 PM',     'Cocktails & Arrivals (Grand Ave + Hope St doors open)'],
    ['6:15–7:00 PM',     'Guests ushered to dinner; program staging final checks'],
    ['7:00–9:30 PM',     'Dinner & Program (on stage)'],
    ['9:00–9:30 PM',     'Flip to afterparty (Hennessy bars up, Mahjong setup, signage flip)'],
    ['9:30 PM–1:00 AM',  'Founders Party (DCP 1F + 2F + Karaoke opens at 11 PM)'],
    ['1:00 AM',          'Event wrap — departures via Hope St'],
  ];
  return `
    <h3 class="info-h">Timeline</h3>
    <table class="info-table">
      <thead><tr><th>Time</th><th>Phase</th></tr></thead>
      <tbody>
        ${rows.map(([time, phase]) => `<tr><td class="t-time">${time}</td><td>${esc(phase)}</td></tr>`).join('')}
      </tbody>
    </table>
  `;
}

function assignmentsHTML(info) {
  const rows = (info.assignments || []).map(a => `
    <tr>
      <td class="t-phase-cell">
        <div class="t-phase">${esc(a.phase)}</div>
        <div class="t-time">${esc(a.time)}</div>
      </td>
      <td>${esc(a.role)}</td>
      <td>${esc(a.location)}</td>
      <td>${esc(a.role_leader)}</td>
    </tr>
  `).join('');
  const notes = (info.assignment_notes || []).map(n => `<li>${esc(n)}</li>`).join('');
  return `
    <h3 class="info-h">Your Assignments</h3>
    <div class="info-table-wrap">
      <table class="info-table assignments-table">
        <thead><tr><th>Phase</th><th>Role</th><th>Location</th><th>Role Leader</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${notes ? `<ul class="info-notes">${notes}</ul>` : ''}
  `;
}

function rolesHTML(info) {
  const blocks = (info.role_descriptions || []).map(r => {
    const partner = renderPartner(r.partner_info);
    const guest = renderGuest(r.guest_info);
    const what = (r.what_youll_do || []).length
      ? `<div class="role-sub">What you'll do</div><ul class="protocol-list">${r.what_youll_do.map(x => `<li>${esc(x)}</li>`).join('')}</ul>`
      : '';
    const lead = r.lead_name
      ? `<div class="role-sub">Your Lead</div>
         <p>${esc(r.lead_name)}${r.lead_tel ? ` &middot; <a class="lead-link" href="tel:${r.lead_tel}">${esc(r.lead_phone)}</a>` : ''}</p>`
      : '';
    return `
      <div class="role-block">
        <div class="role-title">${esc(r.title)}</div>
        ${r.summary ? `<p class="role-summary">${esc(r.summary)}</p>` : ''}
        ${what}
        ${partner}
        ${guest}
        ${lead}
      </div>
    `;
  }).join('');
  const intro = (info.role_descriptions || []).length > 1
    ? `<p class="info-sub">You hold different roles across phases. Each role description is included below.</p>`
    : `<p class="info-sub">You hold the same role across multiple phases. The description below applies to all assigned phases.</p>`;
  return `<h3 class="info-h">Your Role(s)</h3>${intro}${blocks}`;
}

function renderPartner(p) {
  if (!p) return '';
  if (typeof p === 'string') {
    return `<div class="role-sub">Important partner info</div><p>${esc(p)}</p>`;
  }
  return `
    <div class="role-sub">${esc(p.heading || 'Important partner info')}</div>
    <ul class="protocol-list">${(p.items || []).map(x => `<li>${esc(x)}</li>`).join('')}</ul>
  `;
}

function renderGuest(g) {
  if (!g) return '';
  if (typeof g === 'string') {
    return `<div class="role-sub">Important guest info</div><p>${esc(g)}</p>`;
  }
  return `
    <div class="role-sub">Important guest info</div>
    <ul class="protocol-list">${g.map(x => `<li>${esc(x)}</li>`).join('')}</ul>
  `;
}

function contactsHTML(contacts) {
  if (!contacts || !contacts.length) return '';
  const rows = contacts.map(c => `
    <div class="contact-row">
      <div class="contact-name">${esc(c.name)}</div>
      <div class="contact-role">${esc(c.role)}</div>
      ${c.tel ? `<a class="contact-phone" href="tel:${c.tel}">${esc(c.phone)}</a>` : `<span class="contact-phone">${esc(c.phone || '')}</span>`}
    </div>
  `).join('');
  return `<h3 class="info-h">Additional Key Contacts</h3><div class="contact-list">${rows}</div>`;
}

function breaksHTML(info) {
  return `
    <h3 class="info-h">Breaks</h3>
    <p class="info-sub">You will get at least one break during the evening to eat, rest, or watch the show. Confirm with your Role Lead before stepping away.</p>
    ${info.ideal_break ? `<div class="break-pill">Your ideal break: <strong>${esc(info.ideal_break)}</strong></div>` : ''}
    <ul class="protocol-list info-bullets">
      <li>A meal will be provided during the event. Avoid eating or drinking in guest-facing areas during active event hours.</li>
      <li>Coordinate any changes with your Role Lead. If you need to step away unexpectedly, hand off to a teammate first.</li>
      <li>Water and coffee available throughout the day in the production office.</li>
    </ul>
  `;
}

function questionsHTML() {
  return `
    <h3 class="info-h">Questions?</h3>
    <p class="info-sub">Full <a class="text-link" href="/faqs">Staff FAQs</a> cover logistics, dress code, food, breaks, photography, security, and more.</p>
    <p class="info-sub">If anything is unclear, text your Role Lead first. If you cannot reach them, contact Joanna Lin (<a class="lead-link" href="tel:+17346746795">734-674-6795</a>). When in doubt, escalate.</p>
  `;
}

// ----- main render -----
function render() {
  const slug = getSlug();
  const c = document.getElementById('content');
  if (!slug) {
    c.innerHTML = '<div class="empty" style="padding-top:80px">No person specified.</div>';
    return;
  }
  const s = DATA.staff.find(x => slugify(x.name) === slug);
  if (!s) {
    c.innerHTML = '<div class="empty" style="padding-top:80px">Person not found.</div>';
    return;
  }

  const info = SHEETS[slug];

  document.title = s.name + ' · GG26';
  document.getElementById('topTitle').textContent = s.name;

  const dietary = s.dietary && !['n/a', 'none', 'no', ''].includes(s.dietary.toLowerCase()) ? s.dietary : '';

  const heroHTML = `
    <div class="detail-hero">
      <div class="name">${esc(s.name)}</div>
      ${info && info.role_title ? `<div class="role-title-eyebrow">${esc(info.role_title)}</div>` : ''}
      <div class="actions">
        ${s.phone_tel ? `<a class="btn primary" href="tel:${s.phone_tel}"><span>📞</span>Call ${esc(s.phone)}</a>` : ''}
        ${s.phone_tel ? `<a class="btn" href="sms:${s.phone_tel}"><span>💬</span>Text</a>` : ''}
        ${s.email ? `<a class="btn" href="mailto:${esc(s.email)}"><span>✉</span>Email</a>` : ''}
      </div>
    </div>
  `;

  const phaseSummaryHTML = `
    ${phaseRow(s, 'Cocktails', 'cocktails')}
    ${phaseRow(s, 'Dinner & Program', 'dinner')}
    ${phaseRow(s, 'Founders Party', 'founders')}
  `;

  if (info) {
    // Rich layout with info-sheet content
    c.innerHTML = `
      ${heroHTML}
      ${topNavHTML()}
      ${timelineHTML(info.staff_call_time)}
      ${assignmentsHTML(info)}
      ${rolesHTML(info)}
      ${contactsHTML(info.additional_contacts)}
      ${breaksHTML(info)}
      ${dietary ? `<div class="info-row"><span class="k">Dietary</span><span class="v">${esc(dietary)}</span></div>` : ''}
      ${questionsHTML()}
    `;
  } else {
    // Fallback minimal layout (no info-sheet for this person)
    c.innerHTML = `
      ${heroHTML}
      ${phaseSummaryHTML}
      ${s.break ? `<div class="info-row"><span class="k">Break</span><span class="v">${esc(s.break)}</span></div>` : ''}
      ${dietary ? `<div class="info-row"><span class="k">Dietary</span><span class="v">${esc(dietary)}</span></div>` : ''}
      ${s.email ? `<div class="info-row"><span class="k">Email</span><span class="v">${esc(s.email)}</span></div>` : ''}
    `;
  }
}

render();
</script>
</body>
</html>
