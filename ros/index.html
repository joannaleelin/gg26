<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#050505">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="/assets/images/gold-house-ico.png">
<link rel="apple-touch-icon" href="/assets/images/gold-house-ico.png">
<meta property="og:title" content="Gold Gala 2026 · Staff Hub">
<meta property="og:description" content="Everything you need to run the night, in one place.">
<meta property="og:image" content="https://gg26-staff.vercel.app/assets/images/gold-house-ico.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<title>Run of Show · GG26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <a class="back" href="/" aria-label="Back to home">←</a>
    <span class="title">Run of Show</span>
  </header>

  <div class="page-content">
    <h2 class="section-h">Run of Show</h2>
    <p class="section-sub">Saturday, May 9 · Music Center, Los Angeles</p>

    <div class="callout">
      <div class="label">Heads up</div>
      <div class="body">This is the high-level phase timing. Detailed cue-to-cue is held by Show team. Confirm specific timing with your lead day-of.</div>
    </div>

    <div id="rosContent"></div>
  </div>
</div>

<script>
const phases = [
  { name: 'Pre-Event', time: '2:30 – 4:30 PM', desc: 'Setup, final walkthroughs, staff in position. Talent transportation begins.' },
  { name: 'Cocktails', time: '4:30 – 6:30 PM', desc: 'Carpet open. VIP check-in at Grand Ave, GA check-in at Hope St. Founders Room cocktails (closed at 6:30 PM). Photo activations live.' },
  { name: 'Transition to Dinner', time: '6:20 – 7:00 PM', desc: 'Late arrivals routed straight to dinner. Show team to positions. Talent wranglers move to JMP stage.' },
  { name: 'Dinner & Program', time: '7:00 – 9:30 PM', desc: 'Program runs. Talent staged backstage. Photo/Video covers FOH and stage. No staff in guest sightlines.' },
  { name: 'Transition to Afterparty', time: '9:00 – 9:30 PM', desc: 'Gifting team to position. Founders check-in opens at Hope St. Departures team at DCP.' },
  { name: 'Founders Party', time: '9:30 PM – 1:00 AM', desc: 'Karaoke room opens at 11 PM. Gifting through 11 PM. Departures continuous.' },
];

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('rosContent').innerHTML = phases.map(p => `
  <div class="ros-block">
    <div class="ros-time">${esc(p.time)}</div>
    <div class="ros-name">${esc(p.name)}</div>
    <div class="ros-desc">${esc(p.desc)}</div>
  </div>
`).join('');
</script>
</body>
</html>
