<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#050505">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="/assets/images/gold-house-ico.png">
<link rel="apple-touch-icon" href="/assets/images/gold-house-ico.png">
<meta property="og:title" content="Gold Gala 2026 · Staff Hub">
<meta property="og:description" content="Everything you need to run the night, in one place.">
<meta property="og:image" content="https://gg26-staff.vercel.app/assets/images/gold-house-ico.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<title>Run of Show · GG26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
<style>
  .ros-events {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
  }
  .ros-event {
    display: grid;
    grid-template-columns: 112px 1fr;
    gap: 12px;
    align-items: baseline;
    padding-top: 8px;
    border-top: 1px dashed rgba(200, 156, 63, 0.18);
  }
  .ros-event:first-child {
    border-top: none;
    padding-top: 0;
  }
  .ros-event .e-time {
    font-family: 'Inter', sans-serif;
    color: var(--gold-bright, #e8b94a);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.02em;
    line-height: 1.4;
    white-space: nowrap;
  }
  .ros-event .e-text {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text, #f0f0f0);
  }
  .ros-event .e-text strong {
    color: var(--text);
    font-weight: 600;
  }
  .ros-event.is-end .e-time { color: #ff6b6b; }
  .ros-event.is-end .e-text { font-weight: 600; letter-spacing: 0.04em; }
  .ros-block .ros-location {
    font-size: 12px;
    color: var(--text-dim, #9a9a9a);
    margin-top: 4px;
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <a class="back" href="/" aria-label="Back to home">←</a>
    <span class="title">Run of Show</span>
  </header>

  <div class="page-content">
    <h2 class="section-h">Run of Show</h2>
    <p class="section-sub">Saturday, May 9 · Music Center, Los Angeles</p>

    <div class="callout">
      <div class="label">Heads up</div>
      <div class="body">This is the high-level schedule. Detailed cue-to-cue is held by the Show team. Confirm specific timing with your lead day-of.</div>
    </div>

    <div id="rosContent"></div>
  </div>
</div>

<script>
const phases = [
  {
    name: 'Gold Women Breakfast',
    time: '9:00 – 11:30 AM',
    location: 'The EDITION West Hollywood',
    events: [
      { time: '9:00 – 11:30 AM', text: 'Gold Women Breakfast' },
    ],
  },
  {
    name: 'Pre-Gala',
    time: '11:00 AM – 4:30 PM',
    events: [
      { time: '11:00 AM', text: 'Call Time (unless otherwise specified in staffing grid)' },
      { time: '2:00 PM', text: 'Partner staff arrival' },
      { time: '2:00 – 2:30 PM', text: 'Staff Photos in S&R (optional)' },
      { time: '3:00 PM', text: 'Press arrivals' },
      { time: '3:30 PM', text: 'At stations; ready to go' },
    ],
  },
  {
    name: 'Arrivals & Cocktails',
    time: '4:30 – 7:00 PM',
    events: [
      { time: '4:30 PM', text: 'GRAND opens; talent arrivals begin' },
      { time: '5:00 PM', text: 'HOPE opens; GA arrivals begin' },
      { time: '6:30 PM', text: 'Push to dinner' },
    ],
  },
  {
    name: 'Dinner & Program',
    time: '7:00 – 9:30 PM',
    events: [
      { time: '7:00 PM', text: 'Dinner and program starts' },
      { time: '9:30 PM', text: 'Dinner and program ends; gifting opens' },
    ],
  },
  {
    name: 'Founders Party',
    time: '10:00 PM – 1:00 AM',
    events: [
      { time: '10:00 PM', text: 'Founders Party begins' },
      { time: '10:30 PM', text: 'Joe Taslim DJ set starts' },
      { time: '10:45 PM', text: 'Plastique Tiara / Nymphia Wind performance' },
      { time: '11:00 PM', text: 'Karaoke Room opens' },
      { time: '1:00 AM', text: 'END', isEnd: true },
    ],
  },
];

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('rosContent').innerHTML = phases.map(p => `
  <div class="ros-block">
    <div class="ros-time">${esc(p.time)}</div>
    <div class="ros-name">${esc(p.name)}</div>
    ${p.location ? `<div class="ros-location">${esc(p.location)}</div>` : ''}
    <div class="ros-events">
      ${p.events.map(e => `
        <div class="ros-event ${e.isEnd ? 'is-end' : ''}">
          <div class="e-time">${esc(e.time)}</div>
          <div class="e-text">${esc(e.text)}</div>
        </div>
      `).join('')}
    </div>
  </div>
`).join('');
</script>
</body>
</html>
